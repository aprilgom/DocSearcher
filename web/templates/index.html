<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HWP/PDF Searcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .highlight {
            background-color: #fef08a;
            font-weight: bold;
        }
    </style>
    <script>
        function triggerOpen(path) {
            if (window.openFile) {
                window.openFile(path);
            } else {
                alert("This feature is only available in the Desktop Client.\nFile: " + path);
            }
        }
    </script>
</head>

<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">S
                </div>
                <h1 class="text-xl font-bold text-gray-900">DocSearch</h1>
            </div>
            <div class="flex gap-4 text-sm text-gray-500">
                <div id="stats" hx-get="/api/stats" hx-trigger="load, every 5s">
                    Loading stats...
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-4 py-12">

        <!-- Search Bar -->
        <div class="mb-10">
            <div class="relative">
                <input type="text" name="q"
                    class="w-full p-4 pl-12 rounded-xl border border-gray-200 shadow-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition text-lg"
                    placeholder="Search documents..." hx-get="/api/search" hx-include="[name='exact'], [name='nospace']"
                    hx-trigger="keyup changed delay:300ms, search, change from:[name='exact'], change from:[name='nospace']"
                    hx-target="#results" autofocus>
                <svg class="w-6 h-6 text-gray-400 absolute left-4 top-4" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>

            <!-- Options -->
            <div class="mt-3 flex gap-4 text-sm text-gray-600 px-1">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="exact" value="true"
                        class="rounded text-indigo-600 focus:ring-indigo-500">
                    <span>Exact Match (완전 일치)</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="nospace" value="true"
                        class="rounded text-indigo-600 focus:ring-indigo-500">
                    <span>Ignore Spaces (띄어쓰기 무시)</span>
                </label>
                <div class="flex-1 text-right text-xs text-gray-400" id="search-time">
                    <!-- Time will appear here -->
                </div>
            </div>
        </div>

        <!-- Watched Folders -->
        <div class="mb-8 p-4 bg-white rounded-lg border border-gray-100 shadow-sm">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-sm font-semibold text-gray-700">Watched Folders</h3>
                <button hx-post="/api/index/reset"
                    hx-confirm="Are you sure you want to delete the entire index and re-scan?" hx-swap="innerHTML"
                    class="text-xs text-gray-400 hover:text-red-500 transition">
                    Reset Index
                </button>
            </div>

            <!-- List -->
            <ul id="watched-list" class="space-y-2 mb-4" hx-get="/api/config" hx-trigger="load">
                <!-- Loaded via HTMX -->
            </ul>

            <!-- Add Form -->
            <form hx-post="/api/watch" hx-target="#watched-list" class="flex gap-2">
                <input type="text" name="path" placeholder="C:\Path\To\Documents"
                    class="flex-1 p-2 border rounded text-sm">
                <button type="submit"
                    class="bg-gray-900 text-white px-4 py-2 rounded text-sm hover:bg-gray-800 transition">
                    Add Folder
                </button>
            </form>
        </div>

        <!-- Results -->
        <div id="results" class="space-y-4">
            <!-- Results will appear here -->
            <div class="text-center text-gray-400 py-10">
                Start typing to search...
            </div>
        </div>

    </main>

</body>

</html>
